<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="title desc">
  <title id="title">Box spread diagram</title>
  <desc id="desc">Four options legs combine to create a fixed cash payoff</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f7ff"/>
      <stop offset="100%" stop-color="#e8f4fd"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0392F1" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#0392F1"/>
    </marker>
  </defs>
  <rect width="720" height="320" rx="16" fill="url(#bg)" stroke="#0392F1" stroke-opacity="0.25"/>
  <text x="360" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Box spread (simplified)</text>
  <text x="360" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#475569">Four options legs create a fixed payoff (like a loan)</text>

  <g filter="url(#shadow)">
    <rect x="40" y="88" width="140" height="72" rx="10" fill="#fff" stroke="#22a06b" stroke-width="2"/>
    <text x="110" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">Buy call</text>
    <text x="110" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Long call option</text>

    <rect x="200" y="88" width="140" height="72" rx="10" fill="#fff" stroke="#c9372c" stroke-width="2"/>
    <text x="270" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Sell call</text>
    <text x="270" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Short call option</text>

    <rect x="380" y="88" width="140" height="72" rx="10" fill="#fff" stroke="#22a06b" stroke-width="2"/>
    <text x="450" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#166534">Buy put</text>
    <text x="450" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Long put option</text>

    <rect x="540" y="88" width="140" height="72" rx="10" fill="#fff" stroke="#c9372c" stroke-width="2"/>
    <text x="610" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#991b1b">Sell put</text>
    <text x="610" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Short put option</text>
  </g>

  <path d="M110 168 L110 198 L360 198 L360 218" fill="none" stroke="#0392F1" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M270 168 L270 188" fill="none" stroke="#0392F1" stroke-width="2"/>
  <path d="M450 168 L450 188" fill="none" stroke="#0392F1" stroke-width="2"/>
  <path d="M610 168 L610 198 L360 198" fill="none" stroke="#0392F1" stroke-width="2"/>

  <rect x="220" y="228" width="280" height="68" rx="12" fill="#0392F1" fill-opacity="0.1" stroke="#0392F1" stroke-width="2"/>
  <text x="360" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0369a1">Fixed payoff at expiration</text>
  <text x="360" y="278" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Cash today, known repayment later</text>

  <text x="360" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Placeholder diagram. Replace with final asset when available.</text>
</svg>
